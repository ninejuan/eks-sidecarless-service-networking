apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory
  labels:
    app.kubernetes.io/name: inventory
    app.kubernetes.io/part-of: summit-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventory
        app.kubernetes.io/part-of: summit-demo
    spec:
      serviceAccountName: inventory
      containers:
        - name: inventory
          image: INVENTORY_IMAGE
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: inventory
            - name: APP_ENV
              value: demo
            - name: APP_PORT
              value: "8081"
            - name: AWS_REGION
              value: ap-northeast-2
            - name: DYNAMODB_TABLE
              value: summit-demo-inventory-items
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
