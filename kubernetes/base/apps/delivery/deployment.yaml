apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery
  labels:
    app.kubernetes.io/name: delivery
    app.kubernetes.io/part-of: summit-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: delivery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: delivery
        app.kubernetes.io/part-of: summit-demo
    spec:
      serviceAccountName: delivery
      containers:
        - name: delivery
          image: DELIVERY_IMAGE
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: delivery
            - name: APP_ENV
              value: demo
            - name: APP_PORT
              value: "8083"
            - name: REQUEST_TIMEOUT_MS
              value: "1500"
            - name: SHIP_CALL_EXTERNAL
              value: "false"
            - name: READINESS_CHECK_EXTERNAL
              value: "false"
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
