# AWS Gateway API Controller values for bar cluster

deployment:
  replicas: 1

awsRegion: ap-northeast-2
clusterVpcId: "${BAR_VPC_ID}"
clusterName: "${BAR_CLUSTER_NAME}"
defaultServiceNetwork: summit-demo-service-network

# Service account annotation for IRSA/Pod Identity
# The IAM role ARN is provisioned by Terraform (module.iam_gateway_api_controller_bar)
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: "${BAR_GATEWAY_API_CONTROLLER_ROLE_ARN}"

log:
  level: info
