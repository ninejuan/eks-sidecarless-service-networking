# Cilium values for bar cluster
# Inherits base values, overrides cluster-specific settings

eni:
  enabled: true

ipam:
  mode: eni

routingMode: native
kubeProxyReplacement: true
# ENI mode default flipped in 1.18 — be explicit
enableIPv4Masquerade: false

# bar cluster VPC CIDR
ipv4NativeRoutingCIDR: "192.168.0.0/16"

operator:
  replicas: 1

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

gatewayAPI:
  enabled: false

healthChecking: true
healthPort: 9879

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 128Mi

# AL2023 cgroup v2 — already mounted by systemd
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# AL2023 uses ens* interfaces, not eth*
egressMasqueradeInterfaces: ens+

# AL2023 nsenter compatibility — disable sysctlfix init container
sysctlfix:
  enabled: false
